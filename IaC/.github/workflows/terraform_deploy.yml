name: Terraform Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tf_plan_test:
    name: Plan - Test
    environment: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.9

      - name: Terraform Init, Validate & Plan
        id: plan
        env:
          ARM_CLIENT_ID: ${{ secrets.TEST_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.TEST_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.TEST_TENANT_ID }}
          ARM_USE_OIDC: true
        run: |
          terraform init \
            -backend-config="resource_group_name=test-dotnet-tfstate-rg" \
            -backend-config="storage_account_name=testdotnettfstatesa" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=terraform.tfstate"

          terraform fmt -recursive -check

          terraform validate

          terraform plan \
            -var-file="test.tfvars" \
            -out=tfplan \
            -detailed-exitcode || if [ $? -eq 1 ]; then exit 1; fi

      - name: Post Plan Summary
        if: always()
        run: |
          echo "## Terraform Plan - Test" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          terraform show -no-color tfplan >> $GITHUB_STEP_SUMMARY || true
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        env:
          ARM_CLIENT_ID: ${{ secrets.TEST_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.TEST_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.TEST_TENANT_ID }}
          ARM_USE_OIDC: true

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tf_plan_test
          path: tfplan
          retention-days: 1

  tf_apply_test:
    name: Apply - Test
    environment: test-deploy
    runs-on: ubuntu-latest
    needs: tf_plan_test
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.9

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tf_plan_test

      - name: Terraform Init & Apply
        env:
          ARM_CLIENT_ID: ${{ secrets.TEST_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.TEST_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.TEST_TENANT_ID }}
          ARM_USE_OIDC: true
        run: |
          terraform init \
            -backend-config="resource_group_name=test-dotnet-tfstate-rg" \
            -backend-config="storage_account_name=testdotnettfstatesa" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=terraform.tfstate"

          terraform apply -auto-approve tfplan

  tf_plan_stage:
    name: Plan - Stage
    environment: stage
    runs-on: ubuntu-latest
    needs: tf_apply_test
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.9

      - name: Terraform Init, Validate & Plan
        id: plan
        env:
          ARM_CLIENT_ID: ${{ secrets.STAGE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.STAGE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.STAGE_TENANT_ID }}
          ARM_USE_OIDC: true
        run: |
          terraform init \
            -backend-config="resource_group_name=stage-dotnet-tfstate-rg" \
            -backend-config="storage_account_name=stagedotnettfstatesa" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=terraform.tfstate"

          terraform fmt -recursive -check

          terraform validate

          terraform plan \
            -var-file="stage.tfvars" \
            -out=tfplan \
            -detailed-exitcode || if [ $? -eq 1 ]; then exit 1; fi

      - name: Post Plan Summary
        if: always()
        run: |
          echo "## Terraform Plan - Stage" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          terraform show -no-color tfplan >> $GITHUB_STEP_SUMMARY || true
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        env:
          ARM_CLIENT_ID: ${{ secrets.STAGE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.STAGE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.STAGE_TENANT_ID }}
          ARM_USE_OIDC: true

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tf_plan_stage
          path: tfplan
          retention-days: 1

  tf_apply_stage:
    name: Apply - Stage
    environment: stage-deploy
    runs-on: ubuntu-latest
    needs: tf_plan_stage
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.9

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tf_plan_stage

      - name: Terraform Init & Apply
        env:
          ARM_CLIENT_ID: ${{ secrets.STAGE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.STAGE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.STAGE_TENANT_ID }}
          ARM_USE_OIDC: true
        run: |
          terraform init \
            -backend-config="resource_group_name=stage-dotnet-tfstate-rg" \
            -backend-config="storage_account_name=stagedotnettfstatesa" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=terraform.tfstate"

          terraform apply -auto-approve tfplan

  tf_plan_prod:
    name: Plan - Prod
    environment: prod
    runs-on: ubuntu-latest
    needs: tf_apply_stage
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.9

      - name: Terraform Init, Validate & Plan
        id: plan
        env:
          ARM_CLIENT_ID: ${{ secrets.PROD_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.PROD_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.PROD_TENANT_ID }}
          ARM_USE_OIDC: true
        run: |
          terraform init \
            -backend-config="resource_group_name=prod-dotnet-tfstate-rg" \
            -backend-config="storage_account_name=prodotnettfstatesa" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=terraform.tfstate"

          terraform fmt -recursive -check

          terraform validate

          terraform plan \
            -var-file="prod.tfvars" \
            -out=tfplan \
            -detailed-exitcode || if [ $? -eq 1 ]; then exit 1; fi

      - name: Post Plan Summary
        if: always()
        run: |
          echo "## Terraform Plan - Prod" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          terraform show -no-color tfplan >> $GITHUB_STEP_SUMMARY || true
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        env:
          ARM_CLIENT_ID: ${{ secrets.PROD_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.PROD_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.PROD_TENANT_ID }}
          ARM_USE_OIDC: true

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tf_plan_prod
          path: tfplan
          retention-days: 1

  tf_apply_prod:
    name: Apply - Prod
    environment: prod-deploy
    runs-on: ubuntu-latest
    needs: tf_plan_prod
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.9

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tf_plan_prod

      - name: Terraform Init & Apply
        env:
          ARM_CLIENT_ID: ${{ secrets.PROD_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.PROD_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.PROD_TENANT_ID }}
          ARM_USE_OIDC: true
        run: |
          terraform init \
            -backend-config="resource_group_name=prod-dotnet-tfstate-rg" \
            -backend-config="storage_account_name=prodotnettfstatesa" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=terraform.tfstate"

          terraform apply -auto-approve tfplan
